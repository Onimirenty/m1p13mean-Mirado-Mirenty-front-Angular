<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-dark-blue/40 backdrop-blur-sm animate-in fade-in duration-200">

  <div class="relative w-full max-w-md bg-white p-6 md:p-10 rounded-2xl shadow-2xl overflow-hidden animate-in slide-in-from-bottom-4">

    <!-- Header  -->
    <div class="p-4 md:p-4 flex items-center gap-2 border-b border-slate-100 bg-white sticky top-0 z-20">
      <div class="flex-shrink-0 w-12 h-12 bg-dark-blue rounded-xl flex items-center justify-center shadow-lg">
        <i class="fas fa-tags text-white text-xl"></i>
      </div>
      <div class="text-left flex-1">
        <h2 class="text-xl font-extrabold text-dark-blue leading-tight">Nouvelle Catégorie</h2>
        <p class="text-[10px] font-black text-yellow uppercase tracking-[2px] mt-0.5">
          Classification des boutiques
        </p>
      </div>
      <button (click)="close.emit()" class="text-slate-300 hover:text-red transition-colors p-2">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <form [formGroup]="categoryForm" (ngSubmit)="save()" class="space-y-6 mt-4">
      <!-- Nom de la catégorie -->
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Nom de la catégorie</label>
        <input formControlName="nom" type="text" placeholder="ex: Mode & Luxe"
          class="w-full px-4 py-4 border border-dark-blue rounded-xl focus:ring-2 focus:ring-dark-blue outline-none transition font-bold text-sm bg-slate-50/50">
        @if(categoryForm.get('nom')?.invalid && categoryForm.get('nom')?.dirty) {
          <small class="text-red text-[10px] font-bold mt-1 ml-2">Le nom est requis (min. 3 car.)</small>
        }
      </div>

      <div class="space-y-4">

        <!-- ZONE APERÇU ET SAISIE MANUELLE -->
        <div class="flex items-center gap-2 p-2 bg-dark-blue/5 rounded-2xl border border-dark-blue/10">
          <!-- L'Aperçu Dynamique -->
          <div class="w-14 h-14 bg-white rounded-xl flex items-center justify-center text-dark-blue shadow-sm border border-slate-100 flex-shrink-0">
            <i [class]="getPreviewIcon()" class="text-2xl transition-all duration-300"></i>
          </div>

          <div class="flex-1">
            <label class="block text-[10px] font-black text-dark-blue/40 uppercase tracking-widest mb-1 ml-1">Recherche ou Saisie Libre</label>
            <input
              type="text"
              formControlName="iconClass"
              placeholder="ex: fa-ghost ou laptop"
              (input)="onManualInput($event)"
              class="w-full px-4 py-2 bg-white border border-slate-200 rounded-lg text-xs font-bold outline-none focus:border-teal transition-all"
            >
          </div>
        </div>

        <!-- SÉLECTEUR RAPIDE (SCROLLABLE) -->
        <div class="space-y-2">
          <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Sélection rapide</p>
          <div class="grid grid-cols-5 gap-2 bg-slate-50 p-3 rounded-2xl border border-dark-blue/10 max-h-32 overflow-y-auto scrollbar-thin scrollbar-thumb-dark-blue">
            @for (icon of icons(); track icon) {
              <button type="button"
                (click)="categoryForm.patchValue({iconClass: 'fa-solid ' + icon})"
                [class]="categoryForm.get('iconClass')?.value === 'fa-solid ' + icon
                        ? 'bg-dark-blue text-white border-dark-blue scale-90 shadow-md'
                        : 'bg-white text-slate-400 border-slate-100 hover:border-teal hover:text-teal'"
                class="aspect-square rounded-lg border flex items-center justify-center transition-all duration-200 shadow-sm">
                <i class="fas {{ icon }} text-sm"></i>
              </button>
            }
          </div>
        </div>
      </div>

      <!-- Boutons d'Action -->
      <div class="flex flex-col gap-3 pt-2">
        <button type="submit" [disabled]="categoryForm.invalid"
          class="w-full py-4 bg-dark-blue text-white font-black text-xs uppercase tracking-[2px] rounded-xl shadow-xl hover:bg-teal disabled:bg-slate-200 transition-all active:scale-95">
          CRÉER LA CATÉGORIE
        </button>
        <button type="button" (click)="close.emit()" class="text-xs text-slate-400 font-bold hover:text-red transition-colors">
          Annuler l'opération
        </button>
      </div>
    </form>
  </div>
</div>
