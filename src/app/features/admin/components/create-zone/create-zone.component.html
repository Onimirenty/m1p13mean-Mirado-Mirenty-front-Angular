<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-dark-blue/40 backdrop-blur-sm animate-in fade-in duration-200">

  <div class="relative w-full max-w-md bg-white p-6 md:p-10 rounded-2xl shadow-2xl overflow-hidden translate-y-0 animate-in slide-in-from-bottom-4 duration-300">

    <!-- En-tête (Style Register) -->
    <div class="p-4 md:p-4 flex items-center gap-2 border-b border-slate-100 bg-white sticky top-0 z-20">
      <div class="flex-shrink-0 w-12 h-12 bg-dark-blue rounded-xl flex items-center justify-center shadow-lg">
        <i class="fas fa-th-list text-white text-xl"></i>
      </div>
      <div class="text-left flex-1">
        <h2 class="text-xl font-extrabold text-dark-blue leading-tight">Ajouter une Zone</h2>
        <p class="text-[10px] font-black text-yellow uppercase tracking-[2px] mt-0.5">
          <span class="animate-pulse">●</span> Nouveau Box Spatial
        </p>
      </div>
      <button (click)="close.emit()" class="text-slate-300 hover:text-red transition-colors p-2">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <!-- Formulaire (Style Register) -->
    <form [formGroup]="zoneForm" (ngSubmit)="save()" class="space-y-4 mt-4">

      <!-- Étage et Bloc (Ligne double) -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Étage</label>
          <input formControlName="etage" type="text" placeholder="ex: RDC, 1er Étage"
            class="w-full px-4 py-3 border border-dark-blue rounded-lg focus:ring-2 focus:ring-dark-blue outline-none transition font-bold text-sm bg-slate-50/50 placeholder:font-normal">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Bloc</label>
          <input formControlName="bloc" type="text" placeholder="ex: Bloc A"
            class="w-full px-4 py-3 border border-dark-blue rounded-lg focus:ring-2 focus:ring-dark-blue outline-none transition font-bold text-sm bg-slate-50/50 placeholder:font-normal">
        </div>
      </div>

      <!-- Box -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Identifiant Box</label>
        <input formControlName="box" type="text" placeholder="ex: A12"
          class="w-full px-4 py-3 border border-dark-blue rounded-lg focus:ring-2 focus:ring-dark-blue outline-none transition font-bold text-sm bg-slate-50/50 placeholder:font-normal">
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
        <textarea formControlName="description" rows="2" placeholder="Détails sur l'emplacement..."
          class="w-full px-4 py-3 border border-dark-blue rounded-lg focus:ring-2 focus:ring-dark-blue outline-none transition font-bold text-sm bg-slate-50/50 resize-none placeholder:font-normal"></textarea>
      </div>

      <!-- Boutons d'action -->
      <div class="flex flex-col gap-3 pt-2">
        <button type="submit" [disabled]="zoneForm.invalid"
          class="w-full py-4 bg-dark-blue text-white font-black text-xs uppercase tracking-[2px] rounded-xl shadow-xl hover:bg-teal disabled:bg-slate-200 transition-all active:scale-95 shadow-dark-blue/10">
          Valider la Zone
        </button>
        <button type="button" (click)="close.emit()"
          class="order-2 md:order-1 flex-1 py-4 text-sm font-bold text-slate-400 hover:text-dark-blue transition-colors">
          Annuler
        </button>
      </div>
    </form>
  </div>
</div>
