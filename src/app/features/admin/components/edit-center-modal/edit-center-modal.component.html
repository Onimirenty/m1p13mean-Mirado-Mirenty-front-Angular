<!-- Overlay Fixe avec Flou discret (Backdrop) -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-dark-blue/40 backdrop-blur-sm animate-in fade-in duration-200">
  
  <!-- Conteneur Modal : Max-width optimisé pour Mobile/Desktop -->
  <div class="relative w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
    
    <!-- En-tête : Style Inspiré de ton Register -->
    <div class="p-6 md:p-4 flex items-center gap-2 border-b border-slate-100 bg-white sticky top-0 z-20">
      <div class="flex-shrink-0 w-12 h-12 bg-dark-blue rounded-xl flex items-center justify-center shadow-lg">
        <i class="fas fa-cog text-white text-xl animate-spin-slow"></i>
      </div>
      <div class="text-left flex-1">
        <h2 class="text-xl font-extrabold text-dark-blue leading-tight">Configuration Centre</h2>
        <p class="text-[10px] font-black text-yellow uppercase tracking-[2px] mt-0.5">
          <span class="animate-pulse">●</span> Mise à jour des informations
        </p>
      </div>
      <button (click)="close.emit()" class="text-slate-300 hover:text-red transition-colors p-2">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <!-- Corps du Formulaire : Scrollable sur mobile -->
    <form [formGroup]="editForm" (ngSubmit)="save()" class="p-6 md:p-8 space-y-5 overflow-y-auto">
      
      <!-- Section : Informations Générales -->
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-dark-blue/60 uppercase tracking-wider mb-2 ml-1">Description</label>
          <textarea formControlName="description" rows="3" 
            class="w-full px-5 py-3 border border-dark-blue rounded-xl focus:ring-2 focus:ring-teal/20 focus:border-teal outline-none transition-all text-sm font-medium bg-slate-50/50 resize-none"
            placeholder="Décrivez votre centre..."></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-dark-blue/60 uppercase tracking-wider mb-2 ml-1">Contact (Tél)</label>
            <input formControlName="contact" type="text" 
              class="w-full px-5 py-3 border border-dark-blue rounded-xl focus:ring-2 focus:ring-teal/20 focus:border-teal outline-none text-sm font-bold bg-slate-50/50">
          </div>
          <div>
            <label class="block text-xs font-bold text-dark-blue/60 uppercase tracking-wider mb-2 ml-1">Email Support</label>
            <input formControlName="email" type="email" 
              class="w-full px-5 py-3 border border-dark-blue rounded-xl focus:ring-2 focus:ring-teal/20 focus:border-teal outline-none text-sm font-bold bg-slate-50/50">
          </div>
        </div>
      </div>

      <!-- Section : Horaires (Style Grid comme ton Date/Genre) -->
      <div class="bg-slate-50 p-5 rounded-2xl border border-dashed border-slate-200">
        <label class="block text-[10px] font-black text-dark-blue uppercase tracking-[2px] mb-4 text-center">Planning d'ouverture</label>
        <div class="grid grid-cols-2 gap-4">
          <input formControlName="jours" type="text" placeholder="Jours"
            class="w-full px-4 py-3 border border-dark-blue rounded-lg text-xs font-bold outline-none bg-white">
          <input formControlName="heures" type="text" placeholder="Heures"
            class="w-full px-4 py-3 border border-dark-blue rounded-lg text-xs font-bold outline-none bg-white">
        </div>
      </div>

      <!-- Section : Upload Image (Moderne) -->
      <div class="space-y-3">
        <label class="block text-xs font-bold text-dark-blue/60 uppercase tracking-wider ml-1">Plan du centre (.png, .jpg)</label>
        <div class="relative group cursor-pointer border-2 border-dashed border-slate-200 rounded-2xl p-4 hover:border-teal/50 transition-all bg-slate-50/30">
          <input type="file" (change)="onFileSelected($event)" class="absolute inset-0 opacity-0 cursor-pointer z-10">
          <div class="flex items-center gap-5">
            <div class="w-16 h-16 rounded-xl bg-white shadow-sm border border-slate-100 overflow-hidden flex-shrink-0">
              <img [src]="imagePreview()" class="w-full h-full object-cover">
            </div>
            <div class="text-left">
              <p class="text-xs font-bold text-dark-blue italic group-hover:text-teal transition-colors">Cliquer pour remplacer l'image</p>
              <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-tighter">HD recommandé Max 1Mo</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Pied de Modal : Boutons fixes -->
      <div class="flex flex-col md:flex-row gap-2 pt-2 bottom-0 bg-white">
        <button type="button" (click)="close.emit()"
          class="order-2 md:order-1 flex-1 py-4 text-sm font-bold text-slate-400 hover:text-dark-blue transition-colors">
          Annuler
        </button>
        <button type="submit" [disabled]="editForm.invalid"
          class="order-1 md:order-2 flex-[2] py-4 bg-dark-blue text-white font-black text-xs uppercase tracking-[2px] rounded-xl shadow-xl shadow-dark-blue/20 hover:bg-teal hover:shadow-teal/20 disabled:bg-slate-200 disabled:shadow-none transition-all">
          Enregistrer les modifications
        </button>
      </div>
    </form>
  </div>
</div>
